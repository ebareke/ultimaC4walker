name: Build & push container

# Builds the ultimaC4walker image and pushes it to Docker Hub and GHCR.
# Requires two repository secrets for the Docker Hub push:
#   DOCKERHUB_USERNAME  — your Docker Hub user (e.g. ebareke)
#   DOCKERHUB_TOKEN     — a Docker Hub access token (NOT stored in the repo)
# GHCR uses the built-in GITHUB_TOKEN. Only static values + secrets are passed
# to actions via `with:` / `env:` — no untrusted event input reaches a shell.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images (false = build only)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'environment.yml'
      - 'bin/**'
      - 'lib/**'
      - '.github/workflows/containers.yml'
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build image
    runs-on: ubuntu-latest
    env:
      IMAGE: ultimac4walker
      VERSION: '1.0.0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR is always published (built-in GITHUB_TOKEN). Docker Hub is published
      # only when DOCKERHUB_USERNAME is configured, so the workflow stays green
      # for anyone who has not set the Docker Hub secrets.
      - name: Compute image tags
        id: cfg
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          tags="ghcr.io/${OWNER}/${IMAGE}:${VERSION},ghcr.io/${OWNER}/${IMAGE}:latest"
          if [ -n "${DH_USER}" ]; then
            tags="${tags},${DH_USER}/${IMAGE}:${VERSION},${DH_USER}/${IMAGE}:latest"
            echo "dockerhub=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME not set — publishing to GHCR only."
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ steps.cfg.outputs.dockerhub == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.cfg.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
