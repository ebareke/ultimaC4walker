name: Apptainer image (HPC)

# Builds an Apptainer/Singularity SIF from the published container image,
# smoke-tests it under Apptainer, and publishes it to GHCR as an OCI artifact
# (oras://). Pre-seed an HPC cache from GHCR, e.g.:
#   apptainer pull oras://ghcr.io/ebareke/ultimac4walker-apptainer:1.0.0
#
# Safety: only static values + the built-in GITHUB_TOKEN are referenced; no
# untrusted event input reaches a shell.

on:
  workflow_dispatch:
    inputs:
      push:
        description: 'Push SIF to GHCR'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  APPTAINER_VERSION: '1.3.6'
  SIF_NAME: ultimac4walker
  SIF_TAG: '1.0.0'

jobs:
  build-sif:
    name: build + test SIF
    runs-on: ubuntu-latest
    env:
      SRC_IMAGE: docker://ghcr.io/${{ github.repository_owner }}/ultimac4walker:1.0.0
      OWNER: ${{ github.repository_owner }}
      ACTOR: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Install Apptainer (pinned .deb — no JS action)
        run: |
          set -euxo pipefail
          cd /tmp
          wget -q "https://github.com/apptainer/apptainer/releases/download/v${APPTAINER_VERSION}/apptainer_${APPTAINER_VERSION}_amd64.deb"
          sudo apt-get update
          sudo apt-get install -y "./apptainer_${APPTAINER_VERSION}_amd64.deb"
          apptainer --version

      - name: Log in to GHCR for the source pull
        run: |
          set -euxo pipefail
          printf '%s' "$GHCR_TOKEN" \
            | apptainer registry login -u "$ACTOR" --password-stdin oras://ghcr.io

      - name: Build SIF from the published image
        run: |
          set -euxo pipefail
          df -h /
          apptainer build "${SIF_NAME}.sif" "$SRC_IMAGE"

      - name: Smoke test under Apptainer
        run: apptainer run "${SIF_NAME}.sif" version

      - name: Publish to GHCR
        if: ${{ inputs.push }}
        run: |
          set -euxo pipefail
          apptainer push "${SIF_NAME}.sif" \
            "oras://ghcr.io/${OWNER}/${SIF_NAME}-apptainer:${SIF_TAG}"
